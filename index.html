<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --stage:#12172B;
  --stage-2:#1B2140;
  --spotlight:#F2B705;
  --card:#FDF8EC;
  --ink:#1C2333;
  --muted:#8B93AE;
  --bluff:#E8447B;
  --correct:#2FBF71;
  --radius:18px;
}

*{ box-sizing:border-box; }

#app{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(ellipse 700px 400px at 50% -10%, rgba(242,183,5,0.20), transparent 60%),
    var(--stage);
  color:var(--card);
  min-height:100vh;
  padding:24px 16px 80px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.title{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:clamp(28px,5vw,44px);
  letter-spacing:-0.01em;
  text-align:center;
  margin:8px 0 2px;
}
.title span{ color:var(--spotlight); }
.subtitle{ color:var(--muted); font-size:14px; text-align:center; margin-bottom:20px; }

.scoreboard{
  width:100%; max-width:680px;
  display:flex; flex-wrap:wrap; gap:8px;
  justify-content:center;
  margin-bottom:22px;
}
.chip{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:999px;
  padding:7px 14px;
  font-size:14px;
  display:flex; align-items:center; gap:6px;
}
.chip.me{ border-color:var(--spotlight); }
.chip .pts{ font-family:'JetBrains Mono',monospace; color:var(--spotlight); font-weight:700; }

.card{
  background:var(--card);
  color:var(--ink);
  border-radius:var(--radius);
  padding:28px 24px;
  width:100%; max-width:560px;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.stack{ display:flex; flex-direction:column; gap:14px; }

h2{
  font-family:'Space Grotesk',sans-serif;
  font-size:22px; margin:0 0 4px;
}
.hint{ color:#5A6178; font-size:14px; margin:0 0 8px; }

input[type=text]{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:2px solid #E4DCC9;
  font-size:17px;
  font-family:'Inter',sans-serif;
  background:#FFFDF7;
  color:var(--ink);
}
input[type=text]:focus{ outline:none; border-color:var(--spotlight); }

button{
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:16px;
  border:none;
  border-radius:12px;
  padding:15px 20px;
  cursor:pointer;
  min-height:52px;
  transition:transform .08s ease, opacity .15s ease;
}
button:active{ transform:scale(0.98); }
button:disabled{ opacity:.45; cursor:not-allowed; }

.btn-primary{ background:var(--spotlight); color:#2A1E00; }
.btn-secondary{ background:var(--ink); color:var(--card); }
.btn-ghost{ background:transparent; color:var(--muted); font-weight:500; padding:8px; min-height:auto; text-decoration:underline; }
.btn-danger-ghost{ background:transparent; color:var(--bluff); font-weight:500; padding:8px; min-height:auto; text-decoration:underline; }

.grid-cats{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.cat-btn{ background:#F1EAD6; color:var(--ink); text-align:left; font-size:15px; }
.cat-btn:hover{ background:#E9DFC2; }

.question-box{
  background:var(--ink);
  color:var(--card);
  border-radius:14px;
  padding:20px;
  font-family:'Space Grotesk',sans-serif;
  font-size:19px;
  line-height:1.4;
}

.progress{ font-size:14px; color:#5A6178; }

.answer-list{ display:flex; flex-direction:column; gap:10px; }
.answer-card{
  background:#F1EAD6;
  border:2px solid transparent;
  border-radius:12px;
  padding:14px 16px;
  display:flex; gap:12px; align-items:flex-start;
  cursor:pointer; text-align:left; width:100%;
  font-size:16px; color:var(--ink); font-family:'Inter',sans-serif;
}
.answer-card:hover{ border-color:var(--spotlight); }
.answer-card .letter{
  font-family:'JetBrains Mono',monospace; font-weight:700;
  background:var(--ink); color:var(--card);
  border-radius:8px; padding:2px 9px; flex-shrink:0;
}
.answer-card.correct{ border-color:var(--correct); background:#E4F7EC; }
.answer-card.wrong-picked{ border-color:var(--bluff); }
.answer-card .author{ font-size:12px; color:#5A6178; margin-top:4px; }
.answer-card .fooled{ font-size:12px; color:var(--bluff); margin-top:2px; font-weight:600; }

.badge{
  display:inline-block; font-size:11px; font-weight:700; letter-spacing:.03em;
  text-transform:uppercase; padding:3px 9px; border-radius:999px;
}
.badge-you{ background:var(--spotlight); color:#2A1E00; }

.waiting{
  text-align:center; padding:20px 0; color:#5A6178;
}
.pulse{ animation:pulse 1.6s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.4;} }
</style>

<div id="app"></div>

<script>
const KEY = 'nip-game-state';
const myId = 'p_' + Math.random().toString(36).slice(2, 10);
let state = null;
let joined = false;
let myName = '';
let lastStateStr = null;

const CATEGORIES = [
  { key:'science', label:'Natur & Wissenschaft' },
  { key:'history', label:'Geschichte' },
  { key:'language', label:'Sprache & Wörter' },
  { key:'everyday', label:'Alltag & Kurioses' },
  { key:'animals', label:'Tiere' },
  { key:'numbers', label:'Zahlen & Fakten' },
];

const QUESTIONS = [
  {id:'q1', category:'science', prompt:'Wie viele Herzen hat ein Oktopus?', answer:'3'},
  {id:'q2', category:'science', prompt:'Aus wie vielen Knochen besteht das Skelett eines erwachsenen Menschen?', answer:'206'},
  {id:'q3', category:'science', prompt:'Welches Gas macht mit knapp 78 % den größten Teil unserer Atemluft aus?', answer:'Stickstoff'},
  {id:'q4', category:'science', prompt:'Wie nennt man die Angst vor engen Räumen?', answer:'Klaustrophobie'},
  {id:'q5', category:'history', prompt:'In welchem Jahr fiel die Berliner Mauer?', answer:'1989'},
  {id:'q6', category:'history', prompt:'Welches Land gab als erstes der Welt Frauen das Wahlrecht?', answer:'Neuseeland'},
  {id:'q7', category:'history', prompt:'Wie viele Jahre dauerte der sogenannte Hundertjährige Krieg tatsächlich?', answer:'116 Jahre'},
  {id:'q8', category:'history', prompt:'In welchem Jahrhundert wurde der Buchdruck von Gutenberg erfunden?', answer:'15. Jahrhundert'},
  {id:'q9', category:'language', prompt:'Wie viele Fälle (Kasus) hat die deutsche Grammatik?', answer:'4'},
  {id:'q10', category:'language', prompt:'Wie viele Buchstaben hat das deutsche Alphabet inklusive Umlauten und ß?', answer:'30'},
  {id:'q11', category:'language', prompt:'Aus welcher Sprache stammt das unverändert ins Englische übernommene Wort "Kindergarten"?', answer:'Deutsch'},
  {id:'q12', category:'language', prompt:'Wie viele Amtssprachen hat die Europäische Union offiziell?', answer:'24'},
  {id:'q13', category:'everyday', prompt:'Wie viele Liter Speichel produziert ein Mensch im Schnitt pro Tag?', answer:'ca. 1,5 Liter'},
  {id:'q14', category:'everyday', prompt:'Wie viele Muskeln braucht man ungefähr für ein Lächeln?', answer:'ca. 12'},
  {id:'q15', category:'everyday', prompt:'Wie lang ist ein Marathon offiziell (in Kilometern)?', answer:'42,195 km'},
  {id:'q16', category:'everyday', prompt:'An wie viele Länder grenzt Deutschland direkt?', answer:'9'},
  {id:'q17', category:'animals', prompt:'Wie viele Herzpaare hat ein Regenwurm?', answer:'5 Paare'},
  {id:'q18', category:'animals', prompt:'Wie schnell kann ein Gepard maximal laufen (in km/h)?', answer:'ca. 110 km/h'},
  {id:'q19', category:'animals', prompt:'Wie viele Tage kann ein Kamel ungefähr ohne Wasser auskommen?', answer:'bis zu 10 Tage'},
  {id:'q20', category:'animals', prompt:'Wie alt kann eine Galapagos-Riesenschildkröte ungefähr werden?', answer:'über 150 Jahre'},
  {id:'q21', category:'numbers', prompt:'Wie viele Zeitzonen hat Russland?', answer:'11'},
  {id:'q22', category:'numbers', prompt:'Wie viele Bundesländer hat Deutschland?', answer:'16'},
  {id:'q23', category:'numbers', prompt:'Wie viele Ringe zeigt die Olympiaflagge?', answer:'5'},
  {id:'q24', category:'numbers', prompt:'Wie viele Saiten hat eine klassische Konzertgitarre?', answer:'6'},
];

function defaultState(){
  return { players: [], usedQuestions: [], phase: 'lobby', currentRound: null };
}

function catLabel(key){
  const c = CATEGORIES.find(c => c.key === key);
  return c ? c.label : key;
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

async function loadState(){
  try{
    const res = await window.storage.get(KEY, true);
    lastStateStr = res.value;
    state = JSON.parse(res.value);
  }catch(e){
    state = defaultState();
    lastStateStr = JSON.stringify(state);
    try{ await window.storage.set(KEY, lastStateStr, true); }catch(e2){}
  }
  render();
}

// Used by the polling interval: only touches the DOM when the stored
// state actually changed, so a focused input (e.g. while typing a name
// or an answer) doesn't get reset every 1.5s.
async function pollState(){
  try{
    const res = await window.storage.get(KEY, true);
    if(res.value !== lastStateStr){
      lastStateStr = res.value;
      state = JSON.parse(res.value);
      render();
    }
  }catch(e){
    if(!state){
      state = defaultState();
      lastStateStr = JSON.stringify(state);
      try{ await window.storage.set(KEY, lastStateStr, true); }catch(e2){}
      render();
    }
  }
}

async function saveState(newState){
  state = newState;
  render();
  try{
    const res = await window.storage.set(KEY, JSON.stringify(state), true);
    if(res){ state = JSON.parse(res.value); lastStateStr = res.value; render(); }
  }catch(e){ console.error('Speichern fehlgeschlagen', e); }
}

function clone(s){ return JSON.parse(JSON.stringify(s)); }

// ---- actions ----

async function joinGame(){
  const input = document.getElementById('name-input');
  const name = (input.value || '').trim();
  if(!name) return;
  myName = name;
  joined = true;
  const s = clone(state);
  if(!s.players.find(p => p.id === myId)){
    s.players.push({ id: myId, name: myName, score: 0 });
  }
  await saveState(s);
}

async function resetGame(){
  if(!confirm('Spielstand wirklich zurücksetzen? Alle Punkte gehen verloren.')) return;
  await saveState(defaultState());
}

async function becomeMaster(){
  if(state.players.length < 3){
    alert('Mindestens 3 Spieler werden gebraucht, um eine Runde zu starten.');
    return;
  }
  const s = clone(state);
  s.phase = 'picking';
  s.currentRound = {
    masterId: myId,
    category: null,
    questionId: null,
    question: null,
    correctAnswer: null,
    submissions: {},
    revealedAnswers: null,
    guesses: {},
  };
  await saveState(s);
}

function pickQuestionFor(category){
  let pool = QUESTIONS.filter(q => !state.usedQuestions.includes(q.id));
  if(category) pool = pool.filter(q => q.category === category);
  if(pool.length === 0){
    pool = category ? QUESTIONS.filter(q => q.category === category) : [...QUESTIONS];
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

async function pickCategory(category){
  const q = pickQuestionFor(category);
  const s = clone(state);
  s.phase = 'answering';
  s.usedQuestions.push(q.id);
  s.currentRound.category = category;
  s.currentRound.questionId = q.id;
  s.currentRound.question = q.prompt;
  s.currentRound.correctAnswer = q.answer;
  await saveState(s);
}

async function submitAnswer(){
  const input = document.getElementById('answer-input');
  const text = (input.value || '').trim();
  if(!text) return;
  const s = clone(state);
  s.currentRound.submissions[myId] = text;
  await saveState(s);
}

async function revealAnswers(){
  const s = clone(state);
  const list = Object.entries(s.currentRound.submissions).map(([pid, text]) => ({
    id: 'a_' + pid, text, authorId: pid
  }));
  list.push({ id: 'a_correct', text: s.currentRound.correctAnswer, authorId: null });
  s.currentRound.revealedAnswers = shuffle(list);
  s.currentRound.guesses = {};
  s.phase = 'guessing';
  await saveState(s);
}

async function submitGuess(answerId){
  const s = clone(state);
  s.currentRound.guesses[myId] = answerId;
  await saveState(s);
}

async function showResults(){
  const s = clone(state);
  const round = s.currentRound;
  const roundPoints = {};
  s.players.forEach(p => roundPoints[p.id] = 0);

  Object.entries(round.guesses).forEach(([guesserId, answerId]) => {
    if(answerId === 'a_correct'){
      roundPoints[guesserId] = (roundPoints[guesserId] || 0) + 2;
    }
  });
  round.revealedAnswers.forEach(a => {
    if(a.authorId){
      const fooled = Object.entries(round.guesses).filter(
        ([guesserId, answerId]) => answerId === a.id && guesserId !== a.authorId
      ).length;
      roundPoints[a.authorId] = (roundPoints[a.authorId] || 0) + fooled;
    }
  });

  s.players.forEach(p => { p.score = (p.score || 0) + (roundPoints[p.id] || 0); });
  round.roundPoints = roundPoints;
  s.phase = 'results';
  await saveState(s);
}

async function nextRound(){
  const s = clone(state);
  s.phase = 'lobby';
  s.currentRound = null;
  await saveState(s);
}

// ---- rendering ----

function scoreboardHTML(){
  const sorted = [...state.players].sort((a,b) => b.score - a.score);
  return `<div class="scoreboard">${sorted.map(p => `
    <div class="chip ${p.id===myId?'me':''}">
      ${state.currentRound && state.currentRound.masterId===p.id ? '👑 ' : ''}${escapeHTML(p.name)}
      <span class="pts">${p.score}</span>
    </div>`).join('')}</div>`;
}

function escapeHTML(str){
  const d = document.createElement('div');
  d.innerText = str;
  return d.innerHTML;
}

function joinScreen(){
  return `
    <div class="title">Nobody is <span>Perfect</span></div>
    <div class="subtitle">Die Familienrunde für Klugscheißer</div>
    <div class="card stack">
      <h2>Mitspielen</h2>
      <p class="hint">Gib deinen Namen ein, um der Runde beizutreten.</p>
      <input type="text" id="name-input" placeholder="Dein Name" maxlength="20" onkeydown="if(event.key==='Enter')joinGame()">
      <button class="btn-primary" onclick="joinGame()">Beitreten</button>
    </div>`;
}

function lobbyScreen(){
  const canStart = state.players.length >= 3;
  return `
    <div class="card stack">
      <h2>Lobby</h2>
      <p class="hint">${state.players.length} Spieler sind da. ${canStart ? 'Wer leitet die nächste Runde?' : 'Mindestens 3 Spieler nötig, um zu starten.'}</p>
      <button class="btn-primary" ${canStart?'':'disabled'} onclick="becomeMaster()">Diese Runde leiten</button>
      <button class="btn-danger-ghost" onclick="resetGame()">Spielstand zurücksetzen</button>
    </div>`;
}

function pickingScreen(){
  const round = state.currentRound;
  if(round.masterId === myId){
    return `
      <div class="card stack">
        <h2>Frage auswählen</h2>
        <p class="hint">Wähle eine Kategorie für diese Runde.</p>
        <div class="grid-cats">
          ${CATEGORIES.map(c => `<button class="cat-btn" onclick="pickCategory('${c.key}')">${c.label}</button>`).join('')}
        </div>
        <button class="btn-secondary" onclick="pickCategory(null)">Überraschung — zufällige Frage</button>
      </div>`;
  }
  const masterName = state.players.find(p => p.id === round.masterId)?.name || 'Der Spielleiter';
  return `
    <div class="card">
      <div class="waiting pulse">${escapeHTML(masterName)} wählt gerade eine Frage aus …</div>
    </div>`;
}

function answeringScreen(){
  const round = state.currentRound;
  const others = state.players.filter(p => p.id !== round.masterId);
  const submittedCount = Object.keys(round.submissions).length;

  if(round.masterId === myId){
    return `
      <div class="card stack">
        <span class="badge badge-you">Du leitest diese Runde</span>
        <div class="question-box">${escapeHTML(round.question)}</div>
        <p class="hint">Richtige Antwort (nur du siehst das): <strong>${escapeHTML(round.correctAnswer)}</strong></p>
        <p class="progress">${submittedCount} von ${others.length} haben geantwortet.</p>
        <button class="btn-primary" ${submittedCount===0?'disabled':''} onclick="revealAnswers()">Antworten aufdecken</button>
      </div>`;
  }

  const already = round.submissions[myId];
  return `
    <div class="card stack">
      <div class="question-box">${escapeHTML(round.question)}</div>
      ${already ? `
        <div class="waiting pulse">Antwort abgegeben! Warte auf die anderen (${submittedCount}/${others.length}) …</div>
      ` : `
        <p class="hint">Denk dir eine möglichst überzeugende Antwort aus.</p>
        <input type="text" id="answer-input" placeholder="Deine Antwort" onkeydown="if(event.key==='Enter')submitAnswer()">
        <button class="btn-primary" onclick="submitAnswer()">Antwort abgeben</button>
      `}
    </div>`;
}

function guessingScreen(){
  const round = state.currentRound;
  const others = state.players.filter(p => p.id !== round.masterId);
  const guessedCount = Object.keys(round.guesses).length;
  const letters = 'ABCDEFGHIJ';

  const cardsHTML = round.revealedAnswers.map((a, i) => `
    <div class="answer-card"><span class="letter">${letters[i]}</span><span>${escapeHTML(a.text)}</span></div>
  `).join('');

  if(round.masterId === myId){
    return `
      <div class="card stack">
        <h2>Antworten liegen bereit</h2>
        <div class="answer-list">${cardsHTML}</div>
        <p class="progress">${guessedCount} von ${others.length} haben getippt.</p>
        <button class="btn-primary" ${guessedCount===0?'disabled':''} onclick="showResults()">Auswertung zeigen</button>
      </div>`;
  }

  const myGuess = round.guesses[myId];
  if(myGuess){
    return `
      <div class="card stack">
        <h2>Was ist die richtige Antwort?</h2>
        <div class="answer-list">${round.revealedAnswers.map((a,i) => `
          <div class="answer-card ${a.id===myGuess?'wrong-picked':''}"><span class="letter">${letters[i]}</span><span>${escapeHTML(a.text)}</span></div>
        `).join('')}</div>
        <div class="waiting pulse">Tipp abgegeben. Warte auf die anderen (${guessedCount}/${others.length}) …</div>
      </div>`;
  }

  return `
    <div class="card stack">
      <h2>Was ist die richtige Antwort?</h2>
      <p class="hint">Tippe auf die Antwort, die du für richtig hältst.</p>
      <div class="answer-list">
        ${round.revealedAnswers.map((a,i) => `
          <button class="answer-card" onclick="submitGuess('${a.id}')"><span class="letter">${letters[i]}</span><span>${escapeHTML(a.text)}</span></button>
        `).join('')}
      </div>
    </div>`;
}

function resultsScreen(){
  const round = state.currentRound;
  const letters = 'ABCDEFGHIJ';
  const nameOf = id => state.players.find(p => p.id === id)?.name || '???';

  const cardsHTML = round.revealedAnswers.map((a, i) => {
    const isCorrect = a.id === 'a_correct';
    const fooled = isCorrect ? 0 : Object.values(round.guesses).filter(g => g === a.id).length;
    return `
      <div class="answer-card ${isCorrect?'correct':''}">
        <span class="letter">${letters[i]}</span>
        <div>
          <div>${escapeHTML(a.text)}</div>
          ${isCorrect
            ? `<div class="fooled" style="color:var(--correct)">Das war die richtige Antwort</div>`
            : `<div class="author">Bluff von ${escapeHTML(nameOf(a.authorId))}</div>${fooled>0?`<div class="fooled">${fooled} Spieler reingefallen (+${fooled} Punkte)</div>`:''}`
          }
        </div>
      </div>`;
  }).join('');

  const pointsHTML = state.players
    .filter(p => (round.roundPoints[p.id] || 0) > 0)
    .map(p => `<div class="chip"><span>${escapeHTML(p.name)}</span><span class="pts">+${round.roundPoints[p.id]}</span></div>`)
    .join('');

  const isMaster = round.masterId === myId;
  return `
    <div class="card stack">
      <h2>Auflösung</h2>
      <div class="answer-list">${cardsHTML}</div>
      ${pointsHTML ? `<div class="scoreboard" style="margin:6px 0 0">${pointsHTML}</div>` : ''}
      ${isMaster
        ? `<button class="btn-primary" onclick="nextRound()">Nächste Runde</button>`
        : `<div class="waiting pulse">Warte, bis die nächste Runde startet …</div>`}
    </div>`;
}

function render(){
  const app = document.getElementById('app');
  if(!state){
    app.innerHTML = `<div class="title">Nobody is <span>Perfect</span></div><div class="waiting pulse">Lädt …</div>`;
    return;
  }
  if(!joined){
    app.innerHTML = joinScreen();
    return;
  }
  let phaseHTML = '';
  switch(state.phase){
    case 'lobby': phaseHTML = lobbyScreen(); break;
    case 'picking': phaseHTML = pickingScreen(); break;
    case 'answering': phaseHTML = answeringScreen(); break;
    case 'guessing': phaseHTML = guessingScreen(); break;
    case 'results': phaseHTML = resultsScreen(); break;
    default: phaseHTML = lobbyScreen();
  }
  app.innerHTML = `
    <div class="title">Nobody is <span>Perfect</span></div>
    ${scoreboardHTML()}
    ${phaseHTML}
  `;
}

loadState();
setInterval(pollState, 1500);
</script>
